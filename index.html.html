<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Crowns | Next-Gen Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: black; color: white; font-family: sans-serif; }
        .glow { background: radial-gradient(circle at 50% -20%, #3e3e3e, transparent); }
    </style>
</head>
<body class="glow min-h-screen flex items-center justify-center overflow-hidden">
    <div class="text-center px-4">
        <span class="px-4 py-1 text-xs font-medium text-gray-400 border border-gray-800 rounded-full bg-white/5">
            The Crowns Agency is Live
        </span>
        
        <h1 class="mt-8 text-6xl md:text-8xl font-bold tracking-tighter">
            Design at the <br>
            <span class="bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-600">
                speed of thought.
            </span>
        </h1>

        <p class="mt-6 text-gray-400 max-w-xl mx-auto text-lg">
            A minimalist workspace for creators. Built for the next generation of digital builders.
        </p>

        <div class="mt-10 flex gap-4 justify-center">
            <button class="bg-white text-black px-8 py-3 rounded-lg font-bold hover:bg-gray-200 transition">Get Started</button>
            <button class="border border-gray-800 px-8 py-3 rounded-lg font-bold hover:bg-white/5 transition">Contact Us</button>
        </div>
    </div>
</body>
</html>
